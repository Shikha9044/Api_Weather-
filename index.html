<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./style2.css">
    <title>Document</title>
</head>

<body>
    <div id="weather-container">
        <h2 class="main-heading">
            City Temperature Insights
        </h2>
        <input type="text" id="city" placeholder="enter city">
        <button onclick="getWeather()">search</button>
        <img id="weather-icon" alt="weather icon">
        <div id="temp-div"></div>
        <div id="weather-info"></div>
        <div id="hourly-forecast"></div>
    </div>
        <script>function applyWeatherTheme(weatherMain) {
            const body = document.body;
            body.classList.remove('theme-sunny', 'theme-rain', 'theme-snow', 'theme-storm');

            const condition = (weatherMain || '').toLowerCase();

            if (condition.includes('thunderstorm') || condition.includes('storm') || condition.includes('squall')) {
                body.classList.add('theme-storm');
                return;
            }
            if (condition.includes('rain') || condition.includes('drizzle')) {
                body.classList.add('theme-rain');
                return;
            }
            if (condition.includes('snow')) {
                body.classList.add('theme-snow');
                return;
            }
            if (condition.includes('clear')) {
                body.classList.add('theme-sunny');
            }
        }

        function applyTemperatureBackground(tempC, cityName) {
            const body = document.body;
            body.classList.remove('temp-freezing', 'temp-cool', 'temp-warm', 'temp-hot');

            const normalizedCity = (cityName || '').trim().toLowerCase();
            if (normalizedCity === 'manali') {
                body.classList.add('temp-freezing');
                return;
            }

            if (tempC <= 5) {
                body.classList.add('temp-freezing');
                return;
            }
            if (tempC <= 18) {
                body.classList.add('temp-cool');
                return;
            }
            if (tempC <= 30) {
                body.classList.add('temp-warm');
                return;
            }
            body.classList.add('temp-hot');
        }

        function getWeather() {
            const apiKey = '8371aa9ae04a288573b8cb6526f57194';
            const city = document.getElementById('city').value.trim();
            if (!city) {
                alert('please enter a city');
                return;
            }

            console.log('Searching weather for city:', city);

            const encodedCity = encodeURIComponent(city);
            const geoUrl = `https://api.openweathermap.org/geo/1.0/direct?q=${encodedCity}&limit=5&appid=${apiKey}`;

            async function loadWeather() {
                try {
                    const geoRes = await fetch(geoUrl);
                    const geoData = await geoRes.json();
                    console.log('Geo API response:', geoData);

                    if (!geoRes.ok || !Array.isArray(geoData) || geoData.length === 0) {
                        alert('city not found');
                        return;
                    }

                    const location = geoData[0];
                    const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${location.lat}&lon=${location.lon}&units=metric&appid=${apiKey}`;
                    const res = await fetch(weatherUrl);
                    const data = await res.json();
                    console.log('Weather API response:', data);

                    if (!res.ok || String(data.cod) === '404' || !data.main || typeof data.main.temp !== 'number') {
                        const message = data && data.message ? data.message : 'city not found';
                        alert(message);
                        return;
                    }

                    const temp = data.main.temp;
                    const humidity = data.main.humidity;
                    const windSpeed = data.wind && typeof data.wind.speed === 'number' ? data.wind.speed : null;
                    const condition = data.weather && data.weather[0] ? data.weather[0].description : 'N/A';
                    console.log('Parsed weather data:', {
                        city: data.name,
                        tempC: temp,
                        condition: data.weather && data.weather[0] ? data.weather[0].main : 'unknown',
                        humidity,
                        windSpeed
                    });
                    const tempDivInfo = document.getElementById('temp-div');
                    const weatherInfoDiv = document.getElementById('weather-info');
                    tempDivInfo.innerHTML = Math.round(temp) + " celcius";
                    weatherInfoDiv.innerHTML = `
                        <p><strong>City:</strong> ${data.name}</p>
                        <p><strong>Condition:</strong> ${condition}</p>
                        <p><strong>Temperature:</strong> ${Math.round(temp)} C</p>
                        <p><strong>Humidity:</strong> ${humidity}%</p>
                        <p><strong>Wind Speed:</strong> ${windSpeed !== null ? windSpeed + ' m/s' : 'N/A'}</p>
                    `;
                    applyWeatherTheme(data.weather && data.weather[0] ? data.weather[0].main : '');
                    applyTemperatureBackground(temp, city);
                } catch (error) {
                    console.error('Error fetching weather data:', error);
                }
            }

            loadWeather();
        }
    </script>
</body>

</html>
